bypass_sensor:
  name: Bypass sensor
  description: Bypass a supported Alarm.com sensor.
  fields:
    resource_id:
      name: Resource ID
      description: >-
        Alarm.com resource ID for the sensor to bypass. Find this in the
        "resource_id" attribute on the sensor's entity (Settings -> Devices &
        Services -> Alarm.com -> your device -> the sensor entity -> Attributes).
      required: true
      example: "110353471-11"
      selector:
        text:
    partition_id:
      name: Partition ID
      description: Optional Alarm.com partition resource ID. If omitted, the first partition on the same system is used.
      required: false
      example: "20392030"
      selector:
        text:
unbypass_sensor:
  name: Unbypass sensor
  description: Remove bypass from a supported Alarm.com sensor.
  fields:
    resource_id:
      name: Resource ID
      description: >-
        Alarm.com resource ID for the sensor to unbypass. Find this in the
        "resource_id" attribute on the sensor's entity (Settings -> Devices &
        Services -> Alarm.com -> your device -> the sensor entity -> Attributes).
      required: true
      example: "110353471-11"
      selector:
        text:
    partition_id:
      name: Partition ID
      description: Optional Alarm.com partition resource ID. If omitted, the first partition on the same system is used.
      required: false
      example: "20392030"
      selector:
        text:
set_auto_off:
  name: Set auto-off timer
  description: >-
    Schedule one or more Alarm.com lights to turn off after a duration.
    Unlike a plain automation using a "wait then turn off" action, this
    survives a Home Assistant restart (a timer whose time already passed
    while Home Assistant was offline fires immediately on startup; one
    still pending is rescheduled for its remaining time) and exposes the
    scheduled off-time as an "auto_off_at" attribute on the light itself.
  target:
    entity:
      domain: light
      integration: alarmdotcom
  fields:
    duration:
      name: Duration
      description: How long to wait before turning the light off.
      required: true
      example: "00:30:00"
      selector:
        duration:
cancel_auto_off:
  name: Cancel auto-off timer
  description: Cancel a pending auto-off timer for one or more Alarm.com lights, if one is active.
  target:
    entity:
      domain: light
      integration: alarmdotcom
